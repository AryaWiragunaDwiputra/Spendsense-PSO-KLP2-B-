name: Flutter Web CI/CD

on:
  push:
    branches:
      - development
      - main

env:
  IMAGE_NAME: spendsense-web

jobs:
  # ==========================================
  # STAGE 1: TESTING & PENGECEKAN KODE
  # ==========================================
  test:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install Dependencies
        run: flutter pub get

      - name: Static Code Analysis (Linting)
        run: flutter analyze

      # Jika aplikasi belum ada test-nya, kamu bisa tambahkan '#' di depan 2 baris bawah ini untuk mematikannya sementara
      - name: Execute Automated Tests
        run: flutter test

  # ==========================================
  # STAGE 2: BUILD DOCKER & PUSH KE ACR
  # ==========================================
  build-and-push:
    name: Build & Push to ACR
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set Environment Mode
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV_MODE=production" >> $GITHUB_ENV
          else
            echo "ENV_MODE=staging" >> $GITHUB_ENV
          fi

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.ENV_MODE }}-latest

  # ==========================================
  # STAGE 3: DEPLOY KE AZURE WEB APP
  # ==========================================
  deploy:
    name: CD Deployment
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set Target Environment
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "APP_NAME=spendsense" >> $GITHUB_ENV
            echo "PUBLISH_PROFILE=${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PRODUCTION }}" >> $GITHUB_ENV
            echo "DOCKER_TAG=production-latest" >> $GITHUB_ENV
          else
            echo "APP_NAME=spendsense-staging" >> $GITHUB_ENV
            echo "PUBLISH_PROFILE=${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_STAGING }}" >> $GITHUB_ENV
            echo "DOCKER_TAG=staging-latest" >> $GITHUB_ENV
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          publish-profile: ${{ env.PUBLISH_PROFILE }}
          images: "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.DOCKER_TAG }}"
